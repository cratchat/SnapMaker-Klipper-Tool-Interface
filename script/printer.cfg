[include mainsail.cfg]

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
baud: 115200 

[virtual_sdcard]
path: /home/cps/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

## SNAPMAKER 1.0 CONFIG
[printer]
kinematics: cartesian
max_velocity: 140
max_accel:3000
max_z_velocity: 20
max_z_accel: 500
square_corner_velocity:4.0

[stepper_x]
step_pin: PB5
dir_pin: !PB6
enable_pin: !PB7
microsteps: 16
rotation_distance: 8
endstop_pin: ^!PC11
position_endstop: -5
position_min: -5
position_max: 125
homing_speed: 100
second_homing_speed: 5

[stepper_y]
step_pin: PB8
dir_pin: !PB9
enable_pin: !PB4
microsteps: 16
rotation_distance: 8
endstop_pin: ^!PC10
position_endstop: -5
position_min: -5
position_max: 125
homing_speed: 100
second_homing_speed: 5

[stepper_z]
step_pin: PB3
dir_pin: !PD2
enable_pin: !PC12
microsteps: 16
rotation_distance: 8
endstop_pin: ^!PA8
position_endstop: 0
position_min: -8
position_max: 125.5
homing_speed: 100
second_homing_speed: 5

[manual_stepper tool]
step_pin: PA4
dir_pin: !PA1
enable_pin: !PA0
microsteps: 16
rotation_distance: 32.3544767893

[output_pin tool_load]
pin: !PB10
value: 0

[temperature_sensor tool_sensor]
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC5

[output_pin heatbed_load]
pin: PA7
pwm: True
cycle_time: 0.01
value: 0
shutdown_value: 0
scale: 100

[temperature_sensor heatbed_sensor]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4

[output_pin LED_R]
pin: PC7
value:0

[output_pin LED_B]
pin: PC8
value:0

[output_pin GATE_CTRL]
pin: mcu:PB0
value:1

[output_pin MAIN_POWER]
pin: mcu:PF2
value:1

[output_pin STEPPER_POWER]
pin: mcu:PF1
value:1

[bed_mesh]
speed: 80
horizontal_move_z: 1
mesh_min: 15, 15
mesh_max: 115, 115
probe_count: 3, 3

[input_shaper]
shaper_freq_x: 20
shaper_freq_y: 40

[firmware_retraction]
retract_length: 0.6
retract_speed: 40
unretract_extra_length: 0.0
unretract_speed: 20

[force_move]
enable_force_move: 1

[homing_override]
gcode:
    SET_STEPPER_ENABLE STEPPER=stepper_z ENABLE=1
    FORCE_MOVE STEPPER=stepper_z DISTANCE=10 VELOCITY=20 ACCEL=100
    G28 X0
    G28 Y0
    G1 Y125 F5000
    G28 Z0
    G1 Z100 F5000
    G1 X65 Y65

[gcode_macro M3]
description: Turn on tool load device digitally
gcode:
  SET_PIN PIN=tool_load VALUE=1

[gcode_macro M5]
description: Turn off tool load device digitally
gcode:
  SET_PIN PIN=tool_load VALUE=0

[gcode_macro HEATBED_LOAD]
description: Set heatbed load PWM percentage, 0-100
gcode:
    {% set power = params.S|default(0)|float %}
    {% if power < 0 %}
        {% set power = 0 %}
    {% elif power > 100 %}
        {% set power = 100 %}
    {% endif %}
    SET_PIN PIN=heatbed_load VALUE={power}

[gcode_shell_command set_pressure]
command: python3 /home/cps/pressure.py
timeout: 5.0
verbose: True

[gcode_macro SET_PRESSURE]
description: Set GP8403 DAC output voltage
gcode:
    {% set voltage = params.VALUE|float %}
    RUN_SHELL_COMMAND CMD=set_pressure PARAMS={voltage}

[gcode_macro P0]
description: Set pressure DAC to 0V
gcode:
    SET_PRESSURE VALUE=0

[gcode_macro P1]
description: Set pressure DAC to 1V
gcode:
    SET_PRESSURE VALUE=1